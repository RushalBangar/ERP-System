<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Accounts & Fees | Matoshri ERP</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-base: #F3F4F6; --bg-surface: #FFFFFF; --bg-hover: #F9FAFB;
            --text-primary: #111827; --text-secondary: #4B5563; --text-tertiary: #9CA3AF;
            --border-light: #E5E7EB; --accent-primary: #1D4ED8;
            --success: #059669; --danger: #DC2626; --warning: #D97706;
            --shadow-sm: 0 1px 2px rgba(0,0,0,0.05); --shadow-md: 0 4px 6px -1px rgba(0,0,0,0.1);
        }
        .dark-mode {
            --bg-base: #111827; --bg-surface: #1F2937; --bg-hover: #374151;
            --text-primary: #F9FAFB; --text-secondary: #D1D5DB; --text-tertiary: #6B7280;
            --border-light: #374151; --accent-primary: #3B82F6;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background: var(--bg-base); color: var(--text-primary); min-height: 100vh; -webkit-font-smoothing: antialiased; }

        .top-nav {
            background: var(--bg-surface); height: 60px; display: flex; align-items: center; justify-content: space-between;
            padding: 0 24px; border-bottom: 1px solid var(--border-light); box-shadow: var(--shadow-sm);
            position: sticky; top: 0; z-index: 50;
        }
        .nav-left { display: flex; align-items: center; gap: 12px; font-weight: 600; }
        .nav-logo { width: 30px; height: 30px; background: var(--accent-primary); border-radius: 4px; display: flex; align-items: center; justify-content: center; color: white; }
        .back-link { text-decoration: none; color: var(--text-secondary); font-size: 14px; display: flex; align-items: center; gap: 6px; }
        .back-link:hover { color: var(--accent-primary); }

        .container { max-width: 1200px; margin: 0 auto; padding: 40px 24px; }
        .page-header { margin-bottom: 32px; border-bottom: 1px solid var(--border-light); padding-bottom: 24px; }
        .page-header h1 { font-size: 26px; font-weight: 700; margin-bottom: 6px; }
        .page-header p { color: var(--text-secondary); font-size: 15px; }
        .breadcrumb { font-size: 13px; color: var(--text-secondary); display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
        .breadcrumb a { color: var(--accent-primary); text-decoration: none; }

        /* Stats */
        .stat-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 16px; margin-bottom: 32px; }
        .stat-card { background: var(--bg-surface); padding: 20px; border-radius: 8px; border: 1px solid var(--border-light); box-shadow: var(--shadow-sm); }
        .stat-label { font-size: 12px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; color: var(--text-tertiary); display: block; margin-bottom: 8px; }
        .stat-value { font-size: 26px; font-weight: 700; }
        .stat-value.danger { color: var(--danger); }
        .stat-value.success { color: var(--success); }

        /* Transaction table */
        .section-title { font-size: 18px; font-weight: 600; margin-bottom: 16px; }
        .table-wrapper { background: var(--bg-surface); border: 1px solid var(--border-light); border-radius: 8px; overflow: hidden; box-shadow: var(--shadow-sm); }
        table { width: 100%; border-collapse: collapse; }
        thead th { background: var(--bg-base); padding: 12px 20px; text-align: left; font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em; color: var(--text-tertiary); border-bottom: 1px solid var(--border-light); }
        tbody td { padding: 14px 20px; font-size: 14px; border-bottom: 1px solid var(--border-light); }
        tbody tr:last-child td { border-bottom: none; }
        tbody tr:hover { background: var(--bg-hover); }
        .type-invoice { color: var(--danger); font-weight: 600; }
        .type-payment { color: var(--success); font-weight: 600; }
        .status-paid { background: #ECFDF5; color: var(--success); padding: 3px 10px; border-radius: 4px; font-size: 12px; font-weight: 700; }
        .status-pending { background: #FEF2F2; color: var(--danger); padding: 3px 10px; border-radius: 4px; font-size: 12px; font-weight: 700; }
        .dark-mode .status-paid { background: #022c22; }
        .dark-mode .status-pending { background: #450a0a; }

        .loading-state { text-align: center; padding: 80px 20px; color: var(--text-secondary); }
        .loading-state .spinner { width: 32px; height: 32px; border: 3px solid var(--border-light); border-top-color: var(--accent-primary); border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 16px; }
        @keyframes spin { to { transform: rotate(360deg); } }

        @media (max-width: 768px) {
            .top-nav { padding: 0 16px; } .container { padding: 24px 16px; }
            thead th:nth-child(4), tbody td:nth-child(4) { display: none; }
        }
    </style>
</head>
<body>
    <nav class="top-nav">
        <div class="nav-left">
            <div class="nav-logo">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>
            </div>
            Matoshri ERP
        </div>
        <a href="dashboard.html" class="back-link">
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg>
            Back to Dashboard
        </a>
    </nav>

    <main class="container">
        <div class="breadcrumb"><a href="dashboard.html">ERP Portal</a> <span>/</span> <span>Accounts & Fees</span></div>
        <div class="page-header">
            <h1>Fee Ledger</h1>
            <p>View your fee invoices, payment history, and outstanding dues.</p>
        </div>

        <div id="stat-row-container" class="stat-row">
            <div class="stat-card"><span class="stat-label">Loading...</span></div>
        </div>

        <h2 class="section-title">Transaction History</h2>
        <div class="table-wrapper">
            <div class="loading-state">
                <div class="spinner"></div>
                <p>Fetching fee records from server...</p>
            </div>
        </div>
    </main>

    <script type="module">
        import { supabase } from './db-config.js';
        if (localStorage.getItem('darkMode') === 'true') document.body.classList.add('dark-mode');

        (async () => {
        const userJson = localStorage.getItem('user_data');
        if (!userJson) { window.location.href = 'index.html'; return; }
        const user = JSON.parse(userJson);

        const statRow = document.getElementById('stat-row-container');
        const tableWrapper = document.querySelector('.table-wrapper');

        const { data: transactions, error } = await supabase
            .from('fee_transactions')
            .select('*')
            .eq('student_prn', user.prn_number)
            .order('date', { ascending: false });

        if (error || !transactions || transactions.length === 0) {
            tableWrapper.innerHTML = `<div class="loading-state"><p>No fee records found for your PRN (${user.prn_number}).<br>Please run the database.sql script in Supabase first.</p></div>`;
            statRow.innerHTML = '';
            return;
        }

        // Calculate totals
        let totalInvoiced = 0, totalPaid = 0, totalPending = 0;
        transactions.forEach(t => {
            if (t.transaction_type === 'Invoice') {
                totalInvoiced += parseFloat(t.amount);
                if (t.status === 'Pending') totalPending += parseFloat(t.amount);
                else totalPaid += parseFloat(t.amount);
            }
        });
        const fmt = (v) => '₹ ' + v.toLocaleString('en-IN', { minimumFractionDigits: 0 });

        statRow.innerHTML = `
            <div class="stat-card">
                <span class="stat-label">Total Invoiced</span>
                <div class="stat-value">${fmt(totalInvoiced)}</div>
            </div>
            <div class="stat-card">
                <span class="stat-label">Amount Paid</span>
                <div class="stat-value success">${fmt(totalPaid)}</div>
            </div>
            <div class="stat-card">
                <span class="stat-label">Outstanding Due</span>
                <div class="stat-value ${totalPending > 0 ? 'danger' : 'success'}">${fmt(totalPending)}</div>
            </div>`;

        // Build transaction table
        const rows = transactions.map(t => {
            const typeClass = t.transaction_type === 'Invoice' ? 'type-invoice' : 'type-payment';
            const prefix = t.transaction_type === 'Payment' ? '-' : '';
            const statusClass = t.status === 'Paid' ? 'status-paid' : 'status-pending';
            const dateStr = new Date(t.date).toLocaleDateString('en-IN', { day: '2-digit', month: 'short', year: 'numeric' });
            return `<tr>
                <td>${dateStr}</td>
                <td>${t.description}</td>
                <td><span class="${typeClass}">${t.transaction_type}</span></td>
                <td>${t.semester || '—'}</td>
                <td>${prefix}${fmt(t.amount)}</td>
                <td><span class="${statusClass}">${t.status}</span></td>
            </tr>`;
        }).join('');

        tableWrapper.innerHTML = `
            <table>
                <thead>
                    <tr>
                        <th>Date</th>
                        <th>Description</th>
                        <th>Type</th>
                        <th>Semester</th>
                        <th>Amount</th>
                        <th>Status</th>
                    </tr>
                </thead>
                <tbody>${rows}</tbody>
            </table>`;
        })();
    </script>
</body>
</html>
