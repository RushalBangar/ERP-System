<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile | Matoshri ERP</title>
    <link rel="icon" type="image/png" href="../assets/img/favicon.png">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../assets/css/global.css">
    <link rel="stylesheet" href="../assets/css/profile.css">
</head>
<body>
    <!-- TOP HEADER -->
    <header class="top-bar">
        <div class="header-left">
            <img src="../assets/img/favicon.png" alt="Logo" class="college-logo" onerror="this.src='https://via.placeholder.com/40'">
            <span class="college-name">Matoshri College of Engineering & Research Centre, Nashik</span>
        </div>
        
        <div class="header-center">
            <span style="color: #10b981; font-weight: 700;">4G ⚡ 1.5 Mbps</span>
        </div>

        <div class="header-right">
            <div class="nav-icons">
                <a href="dashboard.html" class="icon-btn" title="Home"><svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg></a>
                <a href="dashboard.html" class="icon-btn" title="Dashboard"><svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="7" height="9" x="3" y="3" rx="1"/><rect width="7" height="5" x="14" y="3" rx="1"/><rect width="7" height="9" x="14" y="12" rx="1"/><rect width="7" height="5" x="3" y="16" rx="1"/></svg></a>
                <button class="icon-btn" title="Help"><svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg></button>
                <button class="icon-btn" title="Notifications">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 8a6 6 0 0 1 12 0c0 7 3 9 3 9H3s3-2 3-9"/><path d="M10.3 21a1.94 1.94 0 0 0 3.4 0"/></svg>
                    <span class="notification-badge">3</span>
                </button>
                <button class="icon-btn" title="Fullscreen" onclick="toggleFullscreen()"><svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 3 21 3 21 9"/><polyline points="9 21 3 21 3 15"/><polyline points="21 15 21 21 15 21"/><polyline points="3 9 3 3 9 3"/></svg></button>
            </div>
            <a href="profile.html" class="user-profile" id="user-initials">--</a>
        </div>
    </header>

    <!-- SUB HEADER -->
    <div class="sub-header">
        <div class="user-info">
            <div class="user-avatar">
                <img src="https://ui-avatars.com/api/?name=User&background=random" alt="Avatar" id="user-avatar-img">
            </div>
            <span class="user-name" id="user-display-name">Loading...</span>
            <div class="status-tag">
                <span class="status-dot"></span> Active
            </div>
        </div>
        <div class="user-meta-group">
            <span class="user-meta" id="user-prn-display">Registration No: --</span>
            <span class="user-meta" id="user-course-display">Course: --</span>
        </div>
    </div>

    <main class="container profile-container">
        <!-- Sidebar Navigation (Full 10 Modules) -->
        <aside class="profile-sidebar">
            <nav class="sidebar-nav">
                <button class="nav-item" data-tab="academic">Academic Info</button>
                <button class="nav-item" data-tab="address">Address Details</button>
                <button class="nav-item" data-tab="bank">Bank Details</button>
                <button class="nav-item" data-tab="contact">Contact Details</button>
                <button class="nav-item" data-tab="documents">Document Upload</button>
                <button class="nav-item" data-tab="extra">Extra Curricular</button>
                <button class="nav-item" data-tab="family">Family Details</button>
                <button class="nav-item" data-tab="identity">Identity Details</button>
                <button class="nav-item" data-tab="history">Login History</button>
                <button class="nav-item active" data-tab="personal">Personal Details</button>
            </nav>
        </aside>

        <!-- Main Content Area -->
        <section class="profile-content">
            <div class="breadcrumb"><a href="dashboard.html">Home</a> <span>/</span> <span>Personal Details</span></div>
            
            <div id="personal-tab" class="tab-pane active">
                <!-- Personal Information -->
                <div class="section-card">
                    <h2 class="card-title-sm">Personal Information</h2>
                    <div class="form-grid-4">
                        <div class="form-group">
                            <label>First Name</label>
                            <input type="text" id="p-first-name" readonly>
                        </div>
                        <div class="form-group">
                            <label>Middle Name</label>
                            <input type="text" id="p-middle-name" readonly>
                        </div>
                        <div class="form-group">
                            <label>Last Name</label>
                            <input type="text" id="p-last-name" readonly>
                        </div>
                        <div class="form-group">
                            <label>Gender</label>
                            <input type="text" value="Male" readonly>
                        </div>
                        <div class="form-group">
                            <label>Date of Birth</label>
                            <input type="text" value="12-Oct-2005" readonly>
                        </div>
                        <div class="form-group">
                            <label>Blood Group</label>
                            <input type="text" value="O+ve" readonly>
                        </div>
                        <div class="form-group">
                            <label>Mother Tongue</label>
                            <input type="text" value="Marathi" readonly>
                        </div>
                        <div class="form-group">
                            <label>Handi-capped</label>
                            <input type="text" value="No" readonly>
                        </div>
                    </div>
                </div>

                <!-- Identity & Religion -->
                <div class="section-card">
                    <h2 class="card-title-sm">Identity & Religion</h2>
                    <div class="form-grid-4">
                        <div class="form-group">
                            <label>Religion</label>
                            <input type="text" value="Hindu" readonly>
                        </div>
                        <div class="form-group">
                            <label>Admission Category</label>
                            <input type="text" value="OBC" readonly>
                        </div>
                        <div class="form-group">
                            <label>Cast</label>
                            <input type="text" value="Maratha" readonly>
                        </div>
                        <div class="form-group">
                            <label>Sub-Cast</label>
                            <input type="text" value="Kunbi" readonly>
                        </div>
                        <div class="form-group">
                            <label>Nationality</label>
                            <input type="text" value="Indian" readonly>
                        </div>
                        <div class="form-group">
                            <label>Aadhaar Card No</label>
                            <input type="text" value="XXXX-XXXX-1234" readonly>
                        </div>
                        <div class="form-group">
                            <label>PAN Card No</label>
                            <input type="text" value="XXXXX1234X" readonly>
                        </div>
                        <div class="form-group">
                            <label>Marital Status</label>
                            <input type="text" value="Single" readonly>
                        </div>
                    </div>
                </div>

                <!-- Location Details -->
                <div class="section-card">
                    <h2 class="card-title-sm">Location Details</h2>
                    <div class="form-grid-4">
                        <div class="form-group">
                            <label>Place of Birth</label>
                            <input type="text" value="Nashik" readonly>
                        </div>
                        <div class="form-group">
                            <label>Domicile State</label>
                            <input type="text" value="Maharashtra" readonly>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Other tabs Placeholder -->
            <div id="other-tabs" class="tab-pane">
                <div class="section-card">
                    <p style="text-align: center; color: var(--text-muted); padding: 40px;">Detailed view for this sub-module is being cloned from the original site...</p>
                </div>
            </div>
        </section>
    </main>

    <script type="module" src="../assets/js/profile.js"></script>
</body>
</html>
