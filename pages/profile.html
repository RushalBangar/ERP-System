<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile | Matoshri ERP</title>
    <link rel="icon" type="image/png" href="../assets/img/favicon.png">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../assets/css/global.css">
    <link rel="stylesheet" href="../assets/css/profile.css">
</head>
<body>
    <!-- TOP HEADER -->
    <header class="top-bar">
        <div class="header-left">
            <img src="../assets/img/favicon.png" alt="Logo" class="college-logo" onerror="this.src='https://via.placeholder.com/40'">
            <span class="college-name">Matoshri College of Engineering & Research Ce...</span>
        </div>
        
        <div class="header-center">
            <span>3G ⚡ 1.5 Mbps</span>
        </div>

        <div class="header-right">
            <div class="nav-icons">
                <a href="dashboard.html" class="icon-btn" title="Home"><svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg></a>
                <a href="dashboard.html" class="icon-btn" title="Dashboard"><svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="7" height="9" x="3" y="3" rx="1"/><rect width="7" height="5" x="14" y="3" rx="1"/><rect width="7" height="9" x="14" y="12" rx="1"/><rect width="7" height="5" x="3" y="16" rx="1"/></svg></a>
                <button class="icon-btn" title="Help"><svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg></button>
                <button class="icon-btn" title="Notifications">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 8a6 6 0 0 1 12 0c0 7 3 9 3 9H3s3-2 3-9"/><path d="M10.3 21a1.94 1.94 0 0 0 3.4 0"/></svg>
                    <span class="notification-badge">3</span>
                </button>
                <button class="icon-btn" title="Fullscreen" onclick="toggleFullscreen()"><svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 3 21 3 21 9"/><polyline points="9 21 3 21 3 15"/><polyline points="21 15 21 21 15 21"/><polyline points="3 9 3 3 9 3"/></svg></button>
            </div>
            <a href="profile.html" class="user-profile" id="user-initials">--</a>
        </div>
    </header>

    <!-- SUB HEADER -->
    <div class="sub-header">
        <div class="user-info">
            <div class="user-avatar">
                <img src="https://ui-avatars.com/api/?name=User&background=random" alt="Avatar" id="user-avatar-img">
            </div>
            <span class="user-name" id="user-display-name">Loading...</span>
            <div class="status-tag">
                <span class="status-dot"></span> Active
            </div>
        </div>
            <span class="user-meta" id="user-prn-display">Registration No: --</span>
            <span class="user-meta" id="user-course-display">Course: --</span>
        </div>
    </div>

    <div class="main-content">
        <a href="dashboard.html" style="text-decoration:none; color:var(--text-secondary);">← Back</a>
        
        <div class="profile-header">
            <div class="avatar" id="p-initials">--</div>
            <div>
                <h1 id="p-name">Loading...</h1>
                <p id="p-branch" style="color:var(--text-secondary);">...</p>
            </div>
        </div>

        <div class="form-grid">
            <div class="form-group"><label>Full Name</label><input type="text" id="in-name" readonly></div>
            <div class="form-group"><label>PRN Number</label><input type="text" id="in-prn" readonly></div>
            <div class="form-group"><label>Email</label><input type="text" id="in-email"></div>
            <div class="form-group"><label>Phone</label><input type="text" id="in-phone"></div>
            <div class="form-group"><label>Address</label><input type="text" id="in-address"></div>
        </div>
    </div>

    <script type="module" src="../assets/js/profile.js"></script>
</body>
</html>
