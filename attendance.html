<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Attendance | Matoshri ERP</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-base: #F3F4F6; --bg-surface: #FFFFFF; --bg-hover: #F9FAFB;
            --text-primary: #111827; --text-secondary: #4B5563; --text-tertiary: #9CA3AF;
            --border-light: #E5E7EB; --accent-primary: #1D4ED8;
            --success: #059669; --danger: #DC2626; --warning: #D97706;
            --shadow-sm: 0 1px 2px rgba(0,0,0,0.05); --shadow-md: 0 4px 6px -1px rgba(0,0,0,0.1);
        }
        .dark-mode {
            --bg-base: #111827; --bg-surface: #1F2937; --bg-hover: #374151;
            --text-primary: #F9FAFB; --text-secondary: #D1D5DB; --text-tertiary: #6B7280;
            --border-light: #374151; --accent-primary: #3B82F6;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background: var(--bg-base); color: var(--text-primary); min-height: 100vh; -webkit-font-smoothing: antialiased; }

        .top-nav {
            background: var(--bg-surface); height: 60px; display: flex; align-items: center; justify-content: space-between;
            padding: 0 24px; border-bottom: 1px solid var(--border-light); box-shadow: var(--shadow-sm);
            position: sticky; top: 0; z-index: 50;
        }
        .nav-left { display: flex; align-items: center; gap: 12px; font-weight: 600; }
        .nav-logo { width: 30px; height: 30px; background: var(--accent-primary); border-radius: 4px; display: flex; align-items: center; justify-content: center; color: white; }
        .back-link { text-decoration: none; color: var(--text-secondary); font-size: 14px; display: flex; align-items: center; gap: 6px; }
        .back-link:hover { color: var(--accent-primary); }

        .container { max-width: 1200px; margin: 0 auto; padding: 40px 24px; }
        .page-header { margin-bottom: 32px; border-bottom: 1px solid var(--border-light); padding-bottom: 24px; }
        .page-header h1 { font-size: 26px; font-weight: 700; margin-bottom: 6px; }
        .page-header p { color: var(--text-secondary); font-size: 15px; }
        .breadcrumb { font-size: 13px; color: var(--text-secondary); display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
        .breadcrumb a { color: var(--accent-primary); text-decoration: none; }

        /* Overall Stat Cards */
        .stat-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 16px; margin-bottom: 32px; }
        .stat-card {
            background: var(--bg-surface); padding: 20px; border-radius: 8px; border: 1px solid var(--border-light);
            box-shadow: var(--shadow-sm); display: flex; flex-direction: column; gap: 8px;
        }
        .stat-label { font-size: 12px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; color: var(--text-tertiary); }
        .stat-value { font-size: 30px; font-weight: 700; }
        .stat-value.good { color: var(--success); }
        .stat-value.bad { color: var(--danger); }
        .stat-value.warn { color: var(--warning); }
        .stat-note { font-size: 12px; color: var(--text-tertiary); }

        /* Alert Banner */
        .alert-banner { padding: 14px 20px; border-radius: 8px; margin-bottom: 24px; font-size: 14px; font-weight: 500; display: flex; align-items: center; gap: 10px; }
        .alert-danger { background: #FEF2F2; color: var(--danger); border: 1px solid #FECACA; }
        .alert-success { background: #ECFDF5; color: var(--success); border: 1px solid #A7F3D0; }
        .dark-mode .alert-danger { background: #450a0a; border-color: #7f1d1d; }
        .dark-mode .alert-success { background: #022c22; border-color: #065f46; }

        /* Subject Rows */
        .section-title { font-size: 18px; font-weight: 600; margin-bottom: 16px; }
        .subject-table { background: var(--bg-surface); border: 1px solid var(--border-light); border-radius: 8px; overflow: hidden; box-shadow: var(--shadow-sm); }
        .subject-row { padding: 16px 20px; border-bottom: 1px solid var(--border-light); }
        .subject-row:last-child { border-bottom: none; }
        .row-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .row-title { font-weight: 600; font-size: 15px; }
        .row-counts { font-size: 13px; color: var(--text-secondary); }
        .row-pct { font-size: 16px; font-weight: 700; min-width: 50px; text-align: right; }
        .progress-track { height: 8px; background: var(--bg-base); border-radius: 4px; overflow: hidden; }
        .progress-fill { height: 100%; border-radius: 4px; transition: width 1s ease; }

        .loading-state { text-align: center; padding: 80px 20px; color: var(--text-secondary); }
        .loading-state .spinner { width: 32px; height: 32px; border: 3px solid var(--border-light); border-top-color: var(--accent-primary); border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 16px; }
        @keyframes spin { to { transform: rotate(360deg); } }

        @media (max-width: 768px) { .top-nav { padding: 0 16px; } .container { padding: 24px 16px; } }
    </style>
</head>
<body>
    <nav class="top-nav">
        <div class="nav-left">
            <div class="nav-logo">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
            </div>
            Matoshri ERP
        </div>
        <a href="dashboard.html" class="back-link">
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg>
            Back to Dashboard
        </a>
    </nav>

    <main class="container">
        <div class="breadcrumb"><a href="dashboard.html">ERP Portal</a> <span>/</span> <span>Attendance</span></div>
        <div class="page-header">
            <h1>Attendance Register</h1>
            <p id="page-subtitle">Loading your attendance records...</p>
        </div>

        <div id="stat-row-container" class="stat-row"></div>
        <div id="alert-container"></div>
        
        <h2 class="section-title">Subject-Wise Attendance</h2>
        <div id="subjects-container" class="subject-table">
            <div class="loading-state">
                <div class="spinner"></div>
                <p>Fetching attendance records...</p>
            </div>
        </div>
    </main>

    <script type="module">
        import { supabase } from './db-config.js';
        if (localStorage.getItem('darkMode') === 'true') document.body.classList.add('dark-mode');

        (async () => {
        const userJson = localStorage.getItem('user_data');
        if (!userJson) { window.location.href = 'index.html'; return; }
        const user = JSON.parse(userJson);
        document.getElementById('page-subtitle').innerText = `Academic Year 2025-26 · ${user.branch}`;

        const container = document.getElementById('subjects-container');
        const statRow = document.getElementById('stat-row-container');
        const alertBox = document.getElementById('alert-container');

        // Fetch all attendance records joined with subject names for this student
        const { data: records, error } = await supabase
            .from('attendance_records')
            .select('*, subjects(title, course_code)')
            .eq('student_prn', user.prn_number)
            .order('date', { ascending: false });

        if (error || !records || records.length === 0) {
            container.innerHTML = `<div class="loading-state"><p>No attendance records found for your PRN (${user.prn_number}).<br>Please run the database.sql script in Supabase.</p></div>`;
            return;
        }

        // Group records by subject
        const bySubject = {};
        let totalPresent = 0, totalCount = 0;

        records.forEach(r => {
            const subId = r.subject_id;
            if (!bySubject[subId]) {
                bySubject[subId] = { title: r.subjects.title, code: r.subjects.course_code, present: 0, total: 0 };
            }
            bySubject[subId].total++;
            totalCount++;
            if (r.status === 'Present' || r.status === 'Late') {
                bySubject[subId].present++;
                totalPresent++;
            }
        });

        const overallPct = totalCount > 0 ? ((totalPresent / totalCount) * 100).toFixed(1) : 0;
        const isLow = overallPct < 75;

        // Overall Stats
        statRow.innerHTML = `
            <div class="stat-card">
                <span class="stat-label">Overall Attendance</span>
                <span class="stat-value ${overallPct >= 75 ? 'good' : 'bad'}">${overallPct}%</span>
                <span class="stat-note">${isLow ? '⚠ Below 75% threshold' : '✓ Attendance is satisfactory'}</span>
            </div>
            <div class="stat-card">
                <span class="stat-label">Total Classes Held</span>
                <span class="stat-value">${totalCount}</span>
            </div>
            <div class="stat-card">
                <span class="stat-label">Classes Attended</span>
                <span class="stat-value good">${totalPresent}</span>
            </div>
            <div class="stat-card">
                <span class="stat-label">Classes Missed</span>
                <span class="stat-value ${totalCount - totalPresent > 0 ? 'bad' : ''}">${totalCount - totalPresent}</span>
            </div>`;

        // Alert
        alertBox.innerHTML = isLow
            ? `<div class="alert-banner alert-danger"><strong>⚠ Attendance Warning:</strong> Your overall attendance is ${overallPct}%, which is below the required 75%. Please attend more lectures to avoid being detained.</div>`
            : `<div class="alert-banner alert-success">✓ Your attendance is ${overallPct}%, which is above the 75% requirement.</div>`;

        // Subject rows
        container.innerHTML = '';
        Object.values(bySubject).sort((a,b) => (a.present/a.total) - (b.present/b.total)).forEach(sub => {
            const pct = ((sub.present / sub.total) * 100).toFixed(1);
            const color = pct >= 75 ? '#059669' : '#DC2626';
            container.innerHTML += `
                <div class="subject-row">
                    <div class="row-header">
                        <div>
                            <div class="row-title">${sub.title}</div>
                            <div class="row-counts">${sub.present} / ${sub.total} classes attended</div>
                        </div>
                        <div class="row-pct" style="color:${color}">${pct}%</div>
                    </div>
                    <div class="progress-track">
                        <div class="progress-fill" style="width:${pct}%; background:${color};"></div>
                    </div>
                </div>`;
        });
        })();
    </script>
</body>
</html>
