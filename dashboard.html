<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard | Matoshri ERP</title>
    <!-- Professional Font -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            /* Light Mode Variables - Professional & Clean */
            --bg-base: #F3F4F6; /* Light gray background */
            --bg-surface: #FFFFFF; /* White cards/nav */
            --bg-surface-hover: #F9FAFB;
            
            --text-primary: #111827; /* Near black */
            --text-secondary: #4B5563; /* Slate gray */
            --text-tertiary: #9CA3AF;
            
            --border-light: #E5E7EB;
            --border-focus: #D1D5DB;
            
            /* Accents */
            --accent-primary: #1D4ED8; /* Professional Deep Blue */
            --accent-primary-hover: #1E3A8A;
            --accent-success: #059669;
            --accent-warning: #D97706;
            --accent-danger: #DC2626;
            
            /* Shadows - Subtle */
            --shadow-sm: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
            --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            --shadow-inner: inset 0 2px 4px 0 rgba(0, 0, 0, 0.06);
            
            /* Focus Rings */
            --ring-color: rgba(29, 78, 216, 0.5);
        }

        .dark-mode {
            /* Dark Mode Variables - Formal Studio Dark */
            --bg-base: #111827; /* Very dark slate */
            --bg-surface: #1F2937; /* Slightly lighter surface */
            --bg-surface-hover: #374151;
            
            --text-primary: #F9FAFB;
            --text-secondary: #D1D5DB;
            --text-tertiary: #6B7280;
            
            --border-light: #374151;
            --border-focus: #4B5563;
            
            --accent-primary: #3B82F6; /* Lighter blue for dark mode contrast */
            --accent-primary-hover: #60A5FA;
            
            --shadow-sm: 0 1px 2px 0 rgba(0, 0, 0, 0.5);
            --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.5);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            transition: background-color 0.2s ease, border-color 0.2s ease, color 0.2s ease;
        }

        body {
            background-color: var(--bg-base);
            color: var(--text-primary);
            min-height: 100vh;
            line-height: 1.5;
            -webkit-font-smoothing: antialiased;
        }

        /* --- TOP NAV BAR --- */
        .top-nav {
            background: var(--bg-surface);
            height: 64px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 24px;
            border-bottom: 1px solid var(--border-light);
            box-shadow: var(--shadow-sm);
            position: sticky;
            top: 0;
            z-index: 50;
        }
        
        .nav-left { display: flex; align-items: center; gap: 16px; font-weight: 600; font-size: 16px; }
        .nav-logo { 
            width: 32px; height: 32px; background: var(--accent-primary); 
            border-radius: 4px; display: flex; align-items: center; justify-content: center; color: white;
        }
        .nav-logo svg { width: 18px; height: 18px; }
        .college-name { letter-spacing: -0.01em; color: var(--text-primary); }

        .nav-right { display: flex; align-items: center; gap: 16px; }
        
        .nav-icon-btn { 
            background: transparent; border: 1px solid transparent; color: var(--text-secondary); cursor: pointer;
            width: 36px; height: 36px; border-radius: 6px; display: flex; align-items: center; justify-content: center;
        }
        .nav-icon-btn:hover { 
            background: var(--bg-base); color: var(--text-primary); border-color: var(--border-light);
        }
        .nav-icon-btn:focus-visible { outline: 2px solid var(--accent-primary); outline-offset: 2px; }
        .nav-icon-btn svg { width: 20px; height: 20px; }

        .profile-btn { 
            background: var(--bg-surface); color: var(--accent-primary); border: 2px solid var(--accent-primary);
            border-radius: 50%; width: 36px; height: 36px; display: flex; align-items: center; justify-content: center; 
            font-weight: 600; font-size: 13px; cursor: pointer; padding: 2px;
        }
        .profile-btn:hover { background: var(--accent-primary); color: white; }

        /* --- MAIN LAYOUT --- */
        .container {
            max-width: 1280px;
            margin: 0 auto;
            padding: 40px 24px;
        }

        /* --- HEADER SECTION --- */
        .page-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            margin-bottom: 32px;
            padding-bottom: 24px;
            border-bottom: 1px solid var(--border-light);
        }
        
        .user-greeting h1 { 
            font-size: 28px; font-weight: 700; color: var(--text-primary); margin-bottom: 8px; letter-spacing: -0.02em;
        }
        .user-greeting p { 
            font-size: 15px; color: var(--text-secondary); font-weight: 400; 
        }

        .user-details-box {
            display: flex; gap: 32px; background: var(--bg-surface); padding: 16px 24px; 
            border-radius: 8px; border: 1px solid var(--border-light); box-shadow: var(--shadow-sm);
        }
        .detail-item { display: flex; flex-direction: column; gap: 4px; }
        .detail-label { font-size: 12px; font-weight: 600; color: var(--text-tertiary); text-transform: uppercase; letter-spacing: 0.05em; }
        .detail-value { font-size: 14px; font-weight: 600; color: var(--text-primary); }

        /* --- CONTROLS BAR (Search & Filters) --- */
        .controls-bar {
            display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px;
        }
        .section-title { font-size: 18px; font-weight: 600; color: var(--text-primary); }
        
        .search-box { position: relative; width: 320px; }
        .search-box input {
            width: 100%; padding: 10px 16px 10px 40px; border-radius: 6px;
            border: 1px solid var(--border-focus); background: var(--bg-surface);
            font-size: 14px; color: var(--text-primary); font-family: 'Inter', sans-serif;
            box-shadow: var(--shadow-sm);
        }
        .search-box input:focus {
            outline: none; border-color: var(--accent-primary); box-shadow: 0 0 0 3px var(--ring-color);
        }
        .search-box input::placeholder { color: var(--text-tertiary); }
        .search-box .search-icon {
            position: absolute; left: 12px; top: 50%; transform: translateY(-50%);
            color: var(--text-tertiary); width: 18px; height: 18px; pointer-events: none;
        }

        /* --- MODULES GRID --- */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
        }

        /* Professional Card Design */
        .module-card {
            background: var(--bg-surface);
            border-radius: 8px;
            border: 1px solid var(--border-light);
            padding: 24px;
            display: flex;
            align-items: flex-start;
            gap: 16px;
            text-decoration: none;
            color: var(--text-primary);
            box-shadow: var(--shadow-sm);
            transition: transform 0.2s ease, box-shadow 0.2s ease, border-color 0.2s ease;
            position: relative;
            overflow: hidden;
        }

        /* Subtle left border accent on hover */
        .module-card::before {
            content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 4px;
            background: var(--accent-primary); transform: scaleY(0); transition: transform 0.2s ease; transform-origin: center;
        }

        .module-card:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-md);
            border-color: var(--border-focus);
            background: var(--bg-surface-hover);
        }
        .module-card:hover::before { transform: scaleY(1); }

        .card-icon-wrapper {
            flex-shrink: 0; width: 48px; height: 48px; border-radius: 8px;
            background: var(--bg-base); display: flex; align-items: center; justify-content: center;
            color: var(--accent-primary); border: 1px solid var(--border-light);
        }
        .module-card:hover .card-icon-wrapper {
            background: var(--accent-primary); color: white; border-color: var(--accent-primary);
        }
        .card-icon-wrapper svg { width: 24px; height: 24px; stroke-width: 1.5; }

        .card-content { display: flex; flex-direction: column; gap: 4px; flex-grow: 1; }
        .card-title { font-size: 16px; font-weight: 600; color: var(--text-primary); }
        .card-desc { font-size: 13px; color: var(--text-secondary); line-height: 1.4; display: -webkit-box; -webkit-line-clamp: 2; line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }

        .card-arrow {
            color: var(--text-tertiary); margin-left: auto; align-self: center;
            transition: transform 0.2s ease;
        }
        .module-card:hover .card-arrow { color: var(--accent-primary); transform: translateX(4px); }

        /* Support Button */
        .support-btn {
            position: fixed; bottom: 24px; right: 24px; /* Moved to right */
            background: var(--accent-primary); color: white; padding: 12px 24px;
            border-radius: 6px; font-size: 14px; font-weight: 600;
            border: none; cursor: pointer; display: flex; align-items: center; gap: 8px;
            box-shadow: var(--shadow-md); transition: background-color 0.2s;
        }
        .support-btn:hover { background: var(--accent-primary-hover); }
        .support-btn:focus-visible { outline: 3px solid var(--ring-color); outline-offset: 2px; }

        /* Navigation Links (Breadcrumbs style) */
        .breadcrumb { font-size: 13px; color: var(--text-secondary); display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
        .breadcrumb a { color: var(--accent-primary); text-decoration: none; }
        .breadcrumb a:hover { text-decoration: underline; }

        /* --- MOBILE RESPONSIVENESS --- */
        @media (max-width: 900px) {
            .page-header { flex-direction: column; align-items: flex-start; gap: 24px; }
            .user-details-box { width: 100%; justify-content: space-between; }
        }

        @media (max-width: 768px) {
            .top-nav { padding: 0 16px; }
            .college-name { display: none; }
            .container { padding: 24px 16px; }
            
            .controls-bar { flex-direction: column; align-items: flex-start; gap: 16px; }
            .search-box { width: 100%; }
            
            .grid { grid-template-columns: 1fr; }
            .user-details-box { flex-direction: column; gap: 12px; padding: 16px; }
        }
    </style>
</head>
<body>

    <!-- TOP NAV -->
    <nav class="top-nav" aria-label="Main Navigation">
        <div class="nav-left">
            <div class="nav-logo">
                <svg xmlns="http://www.w3.org/dom/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>
            </div>

                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z"/></svg>
            </button>
            <button class="nav-icon-btn" title="Home" onclick="window.location.href='dashboard.html'" aria-label="Go to Home">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>

        </div>
    </nav>

    <!-- MAIN DASHBOARD -->
    <main class="container">
        
        <!-- BREADCRUMB -->
        <div class="breadcrumb">
            <a href="#">ERP Portal</a>
            <span>/</span>
            <span>Dashboard</span>
        </div>

        <!-- PAGE HEADER -->
        <header class="page-header">
            <div class="user-greeting">
                <h1 id="greeting">Welcome, Student</h1>
                <p>Welcome to the Matoshri Enterprise Resource Planning Portal.</p>
            </div>
            <div class="user-details-box">
                <div class="detail-item">
                    <span class="detail-label">Status</span>
                    <span class="detail-value" style="color: var(--accent-success); display: flex; align-items: center; gap: 6px;">
                        <span style="width: 8px; height: 8px; background: var(--accent-success); border-radius: 50%;"></span> Active
                    </span>
                </div>
                <div class="detail-item">
                    <span class="detail-label">Registration No.</span>
                    <span class="detail-value" id="display-prn">Loading...</span>
                </div>
                <div class="detail-item">
                    <span class="detail-label">Branch</span>
                    <span class="detail-value" id="display-branch">...</span>
                </div>
                <div class="detail-item">
                    <span class="detail-label">Academic Year</span>
                    <span class="detail-value" id="display-year">...</span>
                </div>
            </div>
        </header>

        <!-- CONTROLS BAR -->
        <div class="controls-bar">
            <h2 class="section-title">Application Modules</h2>
            <div class="search-box">
                <svg class="search-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
                <input type="text" id="module-search" name="module-search" placeholder="Search for applications..." autocomplete="off">
            </div>
        </div>

        <!-- GRID -->
        <div class="grid" id="modules-grid" role="list">
            <!-- Rendered by JS -->
        </div>

    </main>

    <button class="support-btn" title="Contact Support Team">
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
        IT Desk
    </button>

    <script type="module">
        // 1. Check Authentication & Populate Header
        const userJson = localStorage.getItem("user_data");
        if (!userJson) {
            window.location.href = "index.html";
        } else {
            const user = JSON.parse(userJson);
            
            document.getElementById("greeting").innerText = `Welcome, ${user.full_name}`;
            document.getElementById("display-prn").innerText = user.prn_number;
            document.getElementById("display-branch").innerText = user.branch;
            document.getElementById("display-year").innerText = user.year;
            
            const initials = user.full_name.split(' ').map(n => n[0]).join('').substring(0, 2).toUpperCase();
            document.getElementById("nav-initials").innerText = initials;
        }

        // 2. SVG Icons (Line Icons, Professional weight)
        const icons = {
            asportal: '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="16" y1="13" x2="8" y2="13"></line><line x1="16" y1="17" x2="8" y2="17"></line><polyline points="10 9 9 9 8 9"></polyline></svg>',
            academics: '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"></path><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"></path></svg>',
            accounts: '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor"><line x1="12" y1="1" x2="12" y2="23"></line><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"></path></svg>',
            admission: '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M16 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path><circle cx="8.5" cy="7" r="4"></circle><line x1="20" y1="8" x2="20" y2="14"></line><line x1="23" y1="11" x2="17" y2="11"></line></svg>',
            career: '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M21.21 15.89A10 10 0 1 1 8 2.83"></path><path d="M22 12A10 10 0 0 0 12 2v10z"></path></svg>',
            certificates: '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor"><circle cx="12" cy="8" r="7"></circle><polyline points="8.21 13.89 7 23 12 20 17 23 15.79 13.88"></polyline></svg>',
            examination: '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor"><rect x="2" y="3" width="20" height="14" rx="2" ry="2"></rect><line x1="8" y1="21" x2="16" y2="21"></line><line x1="12" y1="17" x2="12" y2="21"></line></svg>',
            feedback: '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"></path></svg>',
            grievance: '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"></path><line x1="12" y1="9" x2="12" y2="13"></line><line x1="12" y1="17" x2="12.01" y2="17"></line></svg>',
            ptg: '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path><circle cx="9" cy="7" r="4"></circle><path d="M23 21v-2a4 4 0 0 0-3-3.87"></path><path d="M16 3.13a4 4 0 0 1 0 7.75"></path></svg>',
            project: '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"></path><polyline points="3.27 6.96 12 12.01 20.73 6.96"></polyline><line x1="12" y1="22.08" x2="12" y2="12"></line></svg>',
            quiz: '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="8" x2="12" y2="12"></line><line x1="12" y1="16" x2="12.01" y2="16"></line></svg>',
            resource: '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"></path><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"></path></svg>',
            subject: '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path></svg>',
            timetable: '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect><line x1="16" y1="2" x2="16" y2="6"></line><line x1="8" y1="2" x2="8" y2="6"></line><line x1="3" y1="10" x2="21" y2="10"></line></svg>',
            transport: '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><line x1="3" y1="9" x2="21" y2="9"></line><line x1="9" y1="21" x2="9" y2="9"></line></svg>'
        };

        const modulesList = [
            { name: "Academic Portal", desc: "Manage academic profiles and documents", icon: icons.asportal, link: "#" },
            { name: "Academics", desc: "View subjects, notes, and syllabus", icon: icons.academics, link: "academics.html" },
            { name: "Accounts & Fees", desc: "Check ledgers and pay fees", icon: icons.accounts, link: "accounts.html" },
            { name: "Admission", desc: "Applications and enrollment status", icon: icons.admission, link: "#" },
            { name: "Career Services", desc: "Placements and job opportunities", icon: icons.career, link: "#" },
            { name: "Certificates", desc: "Request transcripts and bona fides", icon: icons.certificates, link: "#" },
            { name: "Examination", desc: "Results, schedules, and forms", icon: icons.examination, link: "examination.html" },
            { name: "Feedback", desc: "Course and faculty evaluations", icon: icons.feedback, link: "#" },
            { name: "Grievance", desc: "Register complaints and tickets", icon: icons.grievance, link: "#" },
            { name: "PTG Meeting", desc: "Parent-teacher group records", icon: icons.ptg, link: "#" },
            { name: "Project Monitoring", desc: "Final year project tracking", icon: icons.project, link: "#" },
            { name: "Assessments", desc: "Online quizzes and tests", icon: icons.quiz, link: "#" },
            { name: "Resources", desc: "Library and shared materials", icon: icons.resource, link: "#" },
            { name: "Course Registration", desc: "Elective selection forms", icon: icons.subject, link: "#" },
            { name: "Timetable & Attendance", desc: "Daily schedule and attendance records", icon: icons.timetable, link: "attendance.html" },
            { name: "Transport", desc: "Bus routes, fees, and pass", icon: icons.transport, link: "#" }
        ];

        const grid = document.getElementById("modules-grid");
        const searchInput = document.getElementById("module-search");
        
        // 3. Render Cards
        function renderModules(items) {
            grid.innerHTML = "";
            if (items.length === 0) {
                grid.innerHTML = `<div style="grid-column: 1/-1; padding: 48px; text-align: center; color: var(--text-secondary); background: var(--bg-surface); border: 1px solid var(--border-light); border-radius: 8px;">
                    <p style="font-weight: 500;">No modules found.</p>
                    <p style="font-size: 13px; margin-top: 4px;">Try adjusting your search query.</p>
                </div>`;
                return;
            }
            items.forEach((mod) => {
                const card = document.createElement("a");
                card.href = mod.link;
                card.className = "module-card";
                card.setAttribute("role", "listitem");
                card.innerHTML = `
                    <div class="card-icon-wrapper">${mod.icon}</div>
                    <div class="card-content">
                        <div class="card-title">${mod.name}</div>
                        <div class="card-desc">${mod.desc}</div>
                    </div>
                    <svg class="card-arrow" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m9 18 6-6-6-6"/></svg>
                `;
                grid.appendChild(card);
            });
        }

        searchInput.addEventListener('input', (e) => {
            const term = e.target.value.toLowerCase();
            const filtered = modulesList.filter(m => 
                m.name.toLowerCase().includes(term) || 
                m.desc.toLowerCase().includes(term)
            );
            renderModules(filtered);
        });

        renderModules(modulesList);

        // 4. Utility Functions
        window.logout = function() {
            localStorage.removeItem("user_data");
            window.location.href = "index.html";
        }

        // Theme Toggle
        const themeBtn = document.getElementById('theme-btn');
        const isDarkMode = localStorage.getItem('darkMode') === 'true';
        
        const moonIcon = '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z"/></svg>';
        const sunIcon = '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2"/><path d="M12 20v2"/><path d="m4.93 4.93 1.41 1.41"/><path d="m17.66 17.66 1.41 1.41"/><path d="M2 12h2"/><path d="M20 12h2"/><path d="m6.34 17.66-1.41 1.41"/><path d="m19.07 4.93-1.41 1.41"/></svg>';
        
        if (isDarkMode) {
            document.body.classList.add('dark-mode');
            themeBtn.innerHTML = sunIcon;
        } else {
            themeBtn.innerHTML = moonIcon;
        }

        window.toggleTheme = function() {
            document.body.classList.toggle('dark-mode');
            const isDark = document.body.classList.contains('dark-mode');
            themeBtn.innerHTML = isDark ? sunIcon : moonIcon;
            localStorage.setItem('darkMode', isDark);
        }
    </script>
</body>
</html>
