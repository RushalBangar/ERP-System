<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Matoshri ERP - Secure Login</title>
    <link rel="icon" type="image/png" href="assets/img/favicon.png">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/login.css">
</head>
<body>

    <div class="bg-image" id="bg-image"></div>
    <div class="bg-overlay" id="bg-overlay"></div>

    <div class="navbar" id="navbar">
        <div class="brand">Matoshri ERP</div>
        <button class="theme-toggle" id="theme-btn">🌙</button>
    </div>

    <div class="login-card" id="login-card">
        <div class="login-header">
            <h2>Student Portal</h2>
            <p>Access or create your ERP account.</p>
        </div>

        <div class="tab-container">
            <button class="tab-btn active" id="tab-login">Sign In</button>
            <button class="tab-btn" id="tab-register">Register</button>
        </div>

        <form id="login-form">
            <div class="form-group">
                <label for="email">Email Address</label>
                <div class="input-wrapper">
                    <input type="email" id="email" placeholder="e.g. rushalbangar19@gmail.com" required>
                </div>
            </div>

            <div class="form-group">
                <label for="prn">PRN Number (Password)</label>
                <div class="input-wrapper">
                    <input type="password" id="prn" placeholder="e.g. 25EN02U009F" required>
                    <button type="button" class="toggle-password" id="eye-btn">👁️</button>
                </div>
            </div>

            <button type="submit" class="btn-primary" id="login-btn">Sign In</button>

            <div class="footer-links">
                <a href="#">Forgot PRN?</a>
            </div>
        </form>

        <form id="register-form" class="hidden">
            <div class="form-group">
                <label for="reg-name">Full Name</label>
                <div class="input-wrapper">
                    <input type="text" id="reg-name" placeholder="e.g. Rushal Bangar" required>
                </div>
            </div>
            
            <div style="display: flex; gap: 12px; margin-bottom: 20px;">
                <div style="flex: 1;">
                    <label style="display: block; font-size: 14px; font-weight: 600; margin-bottom: 8px; color: var(--text-primary);">Branch</label>
                    <select id="reg-branch" required style="width: 100%; padding: 14px 16px; border-radius: 12px; border: 1px solid var(--border-color); background-color: var(--input-bg); color: var(--text-primary); font-size: 15px; outline: none; appearance: none; cursor: pointer;">
                        <option value="" disabled selected>Select Branch</option>
                        <option value="Computer Engineering">Computer Engineering</option>
                        <option value="Mechanical Engineering">Mechanical Engineering</option>
                        <option value="Civil Engineering">Civil Engineering</option>
                        <option value="Electrical Engineering">Electrical Engineering</option>
                        <option value="IT Engineering">IT Engineering</option>
                    </select>
                </div>
                <div style="flex: 1;">
                    <label style="display: block; font-size: 14px; font-weight: 600; margin-bottom: 8px; color: var(--text-primary);">Year</label>
                    <select id="reg-year" required style="width: 100%; padding: 14px 16px; border-radius: 12px; border: 1px solid var(--border-color); background-color: var(--input-bg); color: var(--text-primary); font-size: 15px; outline: none; appearance: none; cursor: pointer;">
                        <option value="" disabled selected>Select Year</option>
                        <option value="1st Year">1st Year</option>
                        <option value="2nd Year">2nd Year</option>
                        <option value="3rd Year">3rd Year</option>
                        <option value="4th Year">4th Year</option>
                    </select>
                </div>
            </div>

            <div class="form-group">
                <label for="reg-email">Email </label>
                <div class="input-wrapper">
                    <input type="email" id="reg-email" placeholder="e.g. student@example.com" required>
                </div>
            </div>

            <div class="form-group">
                <label for="reg-prn">Password</label>
                <div class="input-wrapper">
                    <input type="password" id="reg-prn" placeholder="............" required>
                    <button type="button" class="toggle-password" id="reg-eye-btn">👁️</button>
                </div>
            </div>

            <button type="submit" class="btn-primary" id="register-btn">Create Account</button>
        </form>
    </div>

    <script type="module" src="assets/js/login.js"></script>
</body>
</html>
